<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tailwind CSS</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 font-sans">
    <!-- Navbar -->
    <nav class="bg-blue-300 text-white p-4 flex justify-between items-center">
      <h1 text-xl font-bold>Tailwind CSS</h1>
      <ul class="flex gap-6">
        <li class="hover:text-blue-500 cursor-pointer transition">Docs</li>
        <li class="hover:text-blue-500 cursor-pointer transition">Classes</li>
        <li class="hover:text-blue-500 cursor-pointer transition">
          Modern CSS
        </li>
      </ul>
    </nav>

    <!-- Hero Section -->
    <section
      class="text-center py-16 bg-gradient-to-r from-blue-500 to-purple-500 text-white"
    >
      <h2 class="text-4xl font-bold mb-4">Welcome to the Tailwind CSS</h2>
      <p class="mb-6 text-lg">This is a simple HTML project before styling.</p>
      <button
        class="bg-white text-blue-600 px-6 py-3 rounded-lg hover:bg-blue-300 hover:scale-100 transition duration-300"
      >
        Get Started
      </button>
    </section>

    <!-- Cards Section -->
    <section class="p-10">
      <h3 class="text-2xl font-bold text-center mb-8">Our Features</h3>
      <div
        class="mx-auto flex max-w-sm items-center gap-x-4 rounded-xl bg-white p-6 shadow-lg outline outline-black/5 dark:bg-slate-800 dark:shadow-none dark:-outline-offset-1 dark:outline-white/10"
      >
        <img class="size-12 shrink-0" src="/img/logo.svg" alt="ChitChat Logo" />
        <div>
          <div class="text-xl font-medium text-black dark:text-white">
            ChitChat
          </div>
          <p class="text-gray-500 dark:text-gray-400">
            You have a new message!
          </p>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div
          class="bg-white p-6 rounded-lg shadow-lg hover:shadow-2xl hover:-translate-y-2 transition duration-300"
        >
          <h4 class="text-xl font-semibold mb-3 text-blue-600">Fast</h4>
          <p class="text-gray-600">Our website is very fast.</p>
        </div>

        <div
          class="bg-white p-6 rounded-lg shadow-lg hover:shadow-2xl hover:-translate-y-2 transition duration-300"
        >
          <h4 class="text-xl font-semibold mb-3 text-purple-600">Responsive</h4>
          <p class="text-gray-600">Works on all devices.</p>
        </div>

        <div
          class="bg-white p-6 rounded-lg shadow-lg hover:shadow-2xl hover:-translate-y-2 transition duration-300"
        >
          <h4 class="text-xl font-semibold mb-3 text-green-600">Modern</h4>
          <p class="text-gray-600">Clean and modern design.</p>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-blue-300 text-white text-center p-4">
      <p class="text-sm">© 2026 Tailwind CSS</p>
    </footer>
  </body>
</html>
